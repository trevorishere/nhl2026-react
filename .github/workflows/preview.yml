name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write       # push preview build to gh-pages
  pull-requests: write  # post / update comment

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        run: npm run build
        env:
          BASE_URL: /nhl2026-react/pr-${{ github.event.pull_request.number }}/

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Find existing preview comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- nhl2026-preview -->

      - name: Create or update preview comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- nhl2026-preview -->
            ## 🚀 Preview deployed

            **URL:** https://trevorishere.github.io/nhl2026-react/pr-${{ github.event.pull_request.number }}/

            | | |
            |---|---|
            | Commit | ${{ github.event.pull_request.head.sha }} |
            | Updated | ${{ github.event.pull_request.updated_at }} |

            _Preview will be removed when this PR is closed._

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "pr-${{ github.event.pull_request.number }}" ]; then
            git rm -rf pr-${{ github.event.pull_request.number }}
            git commit -m "chore: remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "No preview directory found, skipping."
          fi
